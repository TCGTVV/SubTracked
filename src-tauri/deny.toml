# cargo-deny config fuer SubTracked. CI (`security.yml`) ruft gezielt
# `cargo deny check bans licenses sources` auf -- Advisories deckt bereits
# der bestehende `cargo audit`-Job ab, daher hier bewusst nicht doppelt gepflegt.

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# Nur zur Referenz falls jemand lokal `cargo deny check` ohne Subcommand
# laeuft -- CI ruft diesen Check nicht auf (siehe Kommentar oben).
[advisories]
ignore = []

[licenses]
# Ermittelt aus der tatsaechlichen Dependency-Landschaft (`cargo metadata`,
# Stand 2026-07-14) -- alles permissiv/OSI-approved. MPL-2.0 kommt von
# wenigen WebKit-Helfern (cssparser, selectors, ...), file-level Copyleft,
# unproblematisch weil wir sie unveraendert einbinden.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MIT-0",
    "Unlicense",
    "BSL-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false
registries = []

[bans]
# "warn" statt "deny": Tauris eigener Dependency-Baum bringt ~36
# Duplicate-Version-Faelle mit (base64, bitflags, ...), ausserhalb unserer
# Kontrolle. Ein "deny" wuerde nur eine lange skip-Liste ohne echten Nutzen
# erzwingen.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
