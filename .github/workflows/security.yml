name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Woechentlicher Guardrail-Lauf, unabhaengig davon ob gerade entwickelt wird.
    - cron: '24 5 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-audit:
    name: pnpm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Audit JS dependencies
        run: pnpm audit --audit-level low

  rust-audit:
    name: cargo audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        working-directory: src-tauri
        run: cargo audit

  rust-deny:
    name: cargo deny
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Nur bans/licenses/sources: Advisories deckt bereits der rust-audit-Job
      # oben ab (cargo audit), nicht doppelt gepflegt. `arguments` ersetzt den
      # Default "--all-features" (sonst würde ts-rs-export, bewusst kein
      # Teil normaler Builds, mitgecheckt) durch ein explizites `--config`,
      # weil cargo-deny `deny.toml` sonst im Repo-Root (Action-CWD) statt in
      # src-tauri/ sucht.
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: src-tauri/Cargo.toml
          arguments: --config src-tauri/deny.toml
          command: check
          command-arguments: bans licenses sources
