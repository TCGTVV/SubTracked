name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: WebdriverIO E2E (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # webkit2gtk-driver liefert WebKitWebDriver, das tauri-driver auf Linux
      # proxied; xvfb gibt der WebKitGTK-Fensterinstanz ein virtuelles Display
      # auf dem headless Runner (unabhaengig von der Treiber-Frage -- ein
      # GTK-Fenster braucht so oder so einen Display-Server).
      - name: Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            webkit2gtk-driver \
            xvfb \
            fluxbox

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Install JS deps (app + e2e workspace)
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      # WEBKIT_DISABLE_COMPOSITING_MODE + LIBGL_ALWAYS_SOFTWARE: der Runner hat
      # keine echte GPU, Xvfb kein DRI3-Device ("libEGL warning: DRI3 error:
      # Could not get DRI3 device") -- behebt diese Warnung, aber alleine noch
      # nicht den eigentlichen Titel-Timeout (2. CI-Lauf). Ohne einen laufenden
      # Window-Manager bleibt ein GTK-Fenster unter Xvfb oft in einem nie
      # "gemappten" Zwischenzustand haengen -- fluxbox (minimal) im Hintergrund
      # statt nur xvfb-run soll das beheben. SUBTRACKED_E2E_TEST: App-eigenes
      # tracing-Log (3. CI-Lauf, Artifact-Upload) zeigte den echten Haenger --
      # setup() blieb exakt bei der Tray-Icon-Registrierung stecken (D-Bus
      # StatusNotifierWatcher fehlt ohne echte Desktop-Umgebung). lib.rs
      # ueberspringt die Tray-Erstellung, wenn diese Variable gesetzt ist.
      - name: Run WebdriverIO E2E tests
        working-directory: e2e
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
          SUBTRACKED_E2E_TEST: "1"
        run: |
          Xvfb :99 -screen 0 1280x1024x24 &
          export DISPLAY=:99
          sleep 2
          fluxbox &
          sleep 1
          pnpm test

      # Diagnose-Netz: solange der E2E-Job noch nicht zuverlaessig gruen ist,
      # sonst keine Sichtbarkeit auf die App-eigenen tracing::info!/error!-Logs
      # (im CI-Log erscheinen nur GTK/dbind-Warnungen auf stderr, nicht der
      # App-eigene stdout-Stream).
      - name: Upload app logs (diagnostics)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: subtracked-app-logs
          path: ~/.local/share/com.tcgtvv.subtracked/logs/
          if-no-files-found: warn
          retention-days: 7
