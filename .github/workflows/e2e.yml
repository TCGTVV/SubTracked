name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: WebdriverIO E2E (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # webkit2gtk-driver liefert WebKitWebDriver, das tauri-driver auf Linux
      # proxied; xvfb gibt der WebKitGTK-Fensterinstanz ein virtuelles Display
      # auf dem headless Runner (unabhaengig von der Treiber-Frage -- ein
      # GTK-Fenster braucht so oder so einen Display-Server).
      - name: Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            webkit2gtk-driver \
            xvfb

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-driver binary
        id: tauri-driver-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}

      - name: Install tauri-driver
        if: steps.tauri-driver-cache.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Install JS deps (app + e2e workspace)
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      # WEBKIT_DISABLE_COMPOSITING_MODE + LIBGL_ALWAYS_SOFTWARE: der Runner hat
      # keine echte GPU, Xvfb kein DRI3-Device ("libEGL warning: DRI3 error:
      # Could not get DRI3 device") -- ohne das haengt das Fenster in einem
      # kaputten Rendering-Zustand, der Titel wird nie gesetzt (erster echter
      # CI-Lauf: Timeout nach 15s trotz erfolgreicher WebDriver-Session).
      - name: Run WebdriverIO E2E tests
        working-directory: e2e
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run --auto-servernum pnpm test
