name: Release

# Läuft, sobald ein Versions-Tag wie v0.1.0 gepusht wird. Baut die Installer
# für Windows, Linux und macOS (Intel + Apple Silicon) und hängt sie an einen
# GitHub-Release. Der Release wird als ENTWURF angelegt — die Assets erst
# prüfen, dann manuell veröffentlichen.
on:
  push:
    tags:
      - 'v*'

# Pro Tag nur einen Release-Lauf; ein erneuter Push desselben Tags bricht den
# alten Lauf ab.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & Release
    permissions:
      # tauri-action legt den Release an und lädt die Assets hoch.
      contents: write

    strategy:
      # Schlägt eine Plattform fehl, laufen die anderen trotzdem zu Ende.
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-Serie)
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          # Intel-Macs
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          # Linux: gleiche Runner-Version wie die tauri-action-Vorlage.
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Auf macOS beide Architekturen, damit die Cross-Target-Builds oben
          # ihre Toolchain finden. Auf Linux/Windows leer.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # System-Deps fürs Tauri-Bundling unter Linux. Gleiche Liste wie in
      # checks.yml (libayatana statt libappindicator, plus libxdo für den Tray)
      # und zusätzlich patchelf, das die AppImage-Erzeugung braucht.
      - name: Tauri Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            patchelf

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Resolve version from tag
        id: version
        shell: bash
        # Tag ist z.B. "v0.2.0"; die Installer-Dateinamen nutzen "0.2.0" (ohne v).
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Den bereits gepushten Tag verwenden, keinen neuen erzeugen.
          tagName: ${{ github.ref_name }}
          releaseName: 'SubTracked ${{ github.ref_name }}'
          releaseBody: |
            SubTracked zeigt dir nicht nur, was deine Abos kosten, sondern wann dein Konto durch kommende Abbuchungen knapp wird. Lokale Desktop-App, keine Cloud, keine Registrierung.

            ## Download

            - Windows: `SubTracked_${{ steps.version.outputs.value }}_x64_en-US.msi`
            - macOS Apple Silicon: `SubTracked_${{ steps.version.outputs.value }}_aarch64.dmg`
            - macOS Intel: `SubTracked_${{ steps.version.outputs.value }}_x64.dmg`
            - Linux Debian/Ubuntu: `SubTracked_${{ steps.version.outputs.value }}_amd64.deb`
            - Linux Fedora/openSUSE/RHEL: `SubTracked-${{ steps.version.outputs.value }}-1.x86_64.rpm`
            - Linux universell: `SubTracked_${{ steps.version.outputs.value }}_amd64.AppImage`

            Die `.app.tar.gz`-Assets für macOS werden für spätere Updater-/Automationspfade mitgebaut; normale Nutzer nehmen die `.dmg`.
            `SHA256SUMS.txt` enthält die Prüfsummen aller Release-Assets.

            ## Hinweis zu unsignierten Builds

            Diese frühe Version ist noch nicht code-signiert. macOS Gatekeeper und Windows SmartScreen können beim ersten Start warnen.

            - macOS: `.dmg` öffnen, App nach `Applications` ziehen, dann per Rechtsklick → Öffnen starten.
            - Windows: SmartScreen → Weitere Informationen → Trotzdem ausführen.

            ## Enthalten

            - Konten mit Saldo, Mindestpuffer und Cashflow-Forecast
            - Abos mit Erinnerungen, Archivierung, Preis-Historie und zweiwöchentlichem Intervall
            - wiederkehrende und einmalige Einnahmen
            - lokale SQLite-Datenbank und JSON-Backup/Restore
            - native Notifications, Tray und Autostart

            Smoke-getestet auf Linux, macOS und Windows. Details und Source-Build-Anleitung stehen im README.
          # Entwurf: erst prüfen, dann manuell veröffentlichen.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checksums:
    name: Attach SHA256 checksums
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      # gh lädt die Draft-Assets herunter und hängt SHA256SUMS.txt wieder an.
      contents: write

    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir release-assets

      - name: Generate SHA256SUMS.txt
        working-directory: release-assets
        run: |
          rm -f SHA256SUMS.txt
          sha256sum * | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            release-assets/SHA256SUMS.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
