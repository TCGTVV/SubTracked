name: Checks

on:
  push:
    branches: [main]
  pull_request:

# Bei neuem Push auf dieselbe Ref alte, noch laufende Runs abbrechen.
concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Tests, Cargo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # System-Deps fuer die Tauri-Crate. cargo clippy/check braucht webkit2gtk
      # & co., obwohl wir hier keine Bundles bauen — die Tauri-Crate selbst
      # compiliert die Bindings.
      - name: Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Biome (lint + format)
        run: pnpm lint

      - name: Knip (unused files/exports/types)
        run: pnpm knip

      - name: Vitest (unit tests)
        run: pnpm test:run

      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo nextest
        working-directory: src-tauri
        run: cargo nextest run

      - name: Check generated TS bindings are up to date
        run: |
          git diff --exit-code -- src/generated || {
            echo "::error::src/generated/*.ts ist nicht aktuell. Lokal 'cargo nextest run --features ts-rs-export export' in src-tauri/ laufen lassen und den Diff committen."
            exit 1
          }

      - name: Cache sqlx-cli binary
        id: sqlx-cli-cache
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-sqlx
          key: sqlx-cli-0.9.0-${{ runner.os }}

      - name: Install sqlx-cli
        if: steps.sqlx-cli-cache.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --version 0.9.0 --no-default-features --features sqlite,rustls --locked

      - name: Check sqlx query cache is up to date
        working-directory: src-tauri
        env:
          DATABASE_URL: sqlite://./.ci-check.db
        run: |
          cargo sqlx database create
          cargo sqlx migrate run --source ./migrations
          cargo sqlx prepare --check -- --tests || {
            echo "::error::.sqlx/ ist nicht aktuell gegenueber Schema/Queries. Lokal 'cargo sqlx prepare -- --tests' laufen lassen und den Diff committen."
            exit 1
          }
